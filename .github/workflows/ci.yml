name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set Nx comparison refs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=HEAD~1" >> "$GITHUB_ENV"
          fi

          echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"

      - name: Detect package-affecting changes
        id: package_changes
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if git diff --name-only "${NX_BASE}...${NX_HEAD}" | grep -Eq '^(apps/|libs/|\.nx/version-plans/|README\.md|ACCESSIBILITY\.md|AGENTS\.md|package\.json|package-lock\.json|nx\.json|angular\.json|\.github/workflows/(ci|release)\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require Nx version plan
        if: github.event_name == 'pull_request' && steps.package_changes.outputs.changed == 'true'
        run: npx nx release plan:check --base="$NX_BASE" --head="$NX_HEAD"

      - name: Verify workspace
        run: npx nx affected -t test,build --base="$NX_BASE" --head="$NX_HEAD"

      - name: Verify packages and release config
        run: npm run verify
