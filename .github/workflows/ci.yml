name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect package-affecting changes
        id: package_changes
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -Eq '^(projects/|scripts/|\.changeset/|package\.json|package-lock\.json|\.github/workflows/(ci|release)\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require changeset metadata
        if: github.event_name == 'pull_request' && steps.package_changes.outputs.changed == 'true'
        run: npm run changeset:status

      - name: Verify workspace
        run: npm run verify
