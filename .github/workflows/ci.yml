name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect package-affecting changes
        id: package_changes
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -Eq '^(apps/|libs/|\.nx/version-plans/|README\.md|AGENTS\.md|package\.json|package-lock\.json|nx\.json|angular\.json|\.github/workflows/(ci|release)\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require Nx version plan
        if: github.event_name == 'pull_request' && steps.package_changes.outputs.changed == 'true'
        run: npx nx release plan:check

      - name: Verify workspace
        run: npx nx affected -t test,build --base=origin/${{ github.base_ref || 'main' }} --head=HEAD

      - name: Verify packages and release config
        run: npm run verify
