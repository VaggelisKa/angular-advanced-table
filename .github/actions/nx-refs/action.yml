name: Resolve Nx base/head refs
description: Sets NX_BASE/NX_HEAD for `nx affected`. Only needed by jobs that run affected.

runs:
  using: composite
  steps:
    - name: Resolve Nx base/head refs
      shell: bash
      env:
        BASE_REF: ${{ github.base_ref }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        if [ "$EVENT_NAME" = "pull_request" ]; then
          git fetch origin "$BASE_REF" --depth=1
          echo "NX_BASE=origin/$BASE_REF" >> "$GITHUB_ENV"
        else
          echo "NX_BASE=HEAD~1" >> "$GITHUB_ENV"
        fi
        echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"
