<div [attr.aria-label]="ariaLabel()" [attr.data-health]="health().tone" class="render-kpi">
  <span aria-hidden="true" class="render-kpi-dot"></span>
  <span class="render-kpi-text">
    <strong>{{ formatDurationMs(measurement()?.durationMs ?? 0) }}</strong>
    <span class="render-kpi-detail">{{ health().label }} · {{ compactSummary() }}</span>
  </span>
</div>
