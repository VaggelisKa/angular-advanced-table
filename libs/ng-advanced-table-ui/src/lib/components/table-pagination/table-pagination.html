@if (controller(); as ctrl) {
  @if (ctrl.enablePagination()) {
    <nat-table-toolbar class="pagination-toolbar" [accessibleName]="resolvedPagerAriaLabel()">
      <!-- Page Size Selection -->
      <div
        class="chip-row compact"
        natToolbarGroup="start"
        [accessibleName]="resolvedPageSizeAriaLabel()"
      >
        @for (option of resolvedPageSizeOptions(); track option.pageSize) {
          <button
            type="button"
            class="chip"
            [natToolbarItem]="'page-size-' + option.pageSize"
            [class.is-active]="selectedPageSize() === option.pageSize"
            [attr.aria-controls]="tableElementId()"
            [attr.aria-label]="option.ariaLabel"
            [attr.aria-pressed]="selectedPageSize() === option.pageSize"
            (click)="setPageSize(option.pageSize)"
          >
            {{ option.text }}
          </button>
        }
      </div>

      <!-- Pager Navigation -->
      <div class="pager" natToolbarGroup="end" [accessibleName]="resolvedPagerAriaLabel()">
        <button
          type="button"
          class="pager-button"
          natToolbarItem="previous-page"
          [attr.aria-label]="previousPageAriaLabel()"
          [attr.aria-controls]="tableElementId()"
          [disabled]="!canPreviousPage()"
          (click)="previousPage()"
        >
          <svg class="pager-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M10.5 3.5 5 8l5.5 4.5-1 1.2L2.8 8l6.7-5.7 1 1.2Z" />
          </svg>
        </button>
        <span class="pager-label">{{ pageIndicator() }}</span>
        <button
          type="button"
          class="pager-button"
          natToolbarItem="next-page"
          [attr.aria-label]="nextPageAriaLabel()"
          [attr.aria-controls]="tableElementId()"
          [disabled]="!canNextPage()"
          (click)="nextPage()"
        >
          <svg class="pager-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="m5.5 3.5 1-1.2L13.2 8l-6.7 5.7-1-1.2L10 8 5.5 3.5Z" />
          </svg>
        </button>
      </div>
    </nat-table-toolbar>
  }
}
