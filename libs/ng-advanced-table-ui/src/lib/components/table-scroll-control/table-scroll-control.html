<div class="scroll-control" role="group" [attr.aria-label]="resolvedAriaLabel()">
  <button
    type="button"
    class="scroll-button scroll-button-left"
    [attr.aria-label]="scrollLeftAriaLabel()"
    [attr.aria-controls]="tableElementId()"
    [disabled]="!canScrollLeft()"
    (click)="scrollByStep(-1)"
  >
    <svg class="scroll-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M10.5 3.5 5 8l5.5 4.5-1 1.2L2.8 8l6.7-5.7 1 1.2Z" />
    </svg>
  </button>

  <label class="scroll-range-label">
    <span class="scroll-range-copy">{{ positionText() }}</span>
    <input
      type="range"
      class="scroll-range"
      min="0"
      [max]="maxScrollLeft()"
      [value]="scrollLeft()"
      [attr.aria-label]="scrollPositionAriaLabel()"
      [attr.aria-valuetext]="positionText()"
      [attr.aria-controls]="tableElementId()"
      [disabled]="!canScroll()"
      (input)="onRangeInput($event)"
    />
  </label>

  <button
    type="button"
    class="scroll-button scroll-button-right"
    [attr.aria-label]="scrollRightAriaLabel()"
    [attr.aria-controls]="tableElementId()"
    [disabled]="!canScrollRight()"
    (click)="scrollByStep(1)"
  >
    <svg class="scroll-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="m5.5 3.5 1-1.2L13.2 8l-6.7 5.7-1-1.2L10 8 5.5 3.5Z" />
    </svg>
  </button>
</div>
