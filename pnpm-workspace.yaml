packages:
  - 'libs/*'
  - 'apps/*'
# pnpm 11 ignores the .npmrc `node-linker=hoisted` key, so it is set here too.
# Hoisting keeps a single root node_modules. Each project declares its own deps
# (apps/showcase owns the app runtime deps; the libs declare peers); the root
# manifest holds tooling/devDeps only. The libs' framework (e.g. @angular/core
# for their build/specs) resolves from showcase's declaration via this hoisting.
nodeLinker: hoisted
# pnpm 11 runs `pnpm install` before every `pnpm run`/`pnpm exec` by default
# (verifyDepsBeforeRun). Disable it so script runs (e.g. `pnpm run verify`,
# `pnpm nx ...`) use the already-installed deps instead of triggering a
# redundant reinstall on each invocation.
verifyDepsBeforeRun: false
# pnpm 11 ignores the .npmrc `link-workspace-packages` key, so it is set here
# too. Links the showcase's `ng-advanced-table: "workspace:*"` dep to local
# source instead of resolving the published tarball during re-resolution.
linkWorkspacePackages: true
# Keep vulnerable transitive versions out of the graph until their direct
# parents publish releases that include the fixes. Parent-scoped overrides
# avoid replacing unrelated major versions elsewhere in the workspace.
overrides:
  '@angular/build>piscina': '5.2.0'
  '@nx/webpack@23.1.0-beta.0>less': '4.6.7'
  'nx@22.7.3>brace-expansion': '5.0.6'
  'nx@22.7.3>form-data': '4.0.6'
  'nx@22.7.3>tmp': '0.2.7'
  'nx@22.7.3>yaml': '2.9.0'
catalogs:
  # runtime: Angular + table/reactivity packages
  frontend:
    '@angular/aria': '22.0.2'
    '@angular/cdk': '22.0.2'
    '@angular/common': '22.0.2'
    '@angular/compiler': '22.0.2'
    '@angular/core': '22.0.2'
    '@angular/forms': '22.0.2'
    '@angular/platform-browser': '22.0.2'
    '@angular/platform-server': '22.0.2'
    '@angular/router': '22.0.2'
    '@angular/ssr': '22.0.3'
    '@tanstack/angular-table': '^8.21.4'
    '@tanstack/angular-virtual': '^5.0.7'
    rxjs: '~7.8.2'
    # showcase-only: Prism syntax highlighting
    prismjs: '^1.30.0'
  # published peer ranges for the libs. Decoupled from `frontend` so the app
  # pins exact versions while published tarballs keep caret ranges (pnpm
  # rewrites catalog: refs to these literals at publish time).
  peers:
    '@angular/aria': '^22.0.2'
    '@angular/cdk': '^22.0.2'
    '@angular/common': '^22.0.2'
    '@angular/core': '^22.0.2'
    '@tanstack/angular-virtual': '^5.0.7'
  # dev: Angular build/CLI, Nx Angular plugin, packaging, test runners
  frontend-dev:
    '@angular/build': '22.0.3'
    '@angular/cli': '22.0.3'
    '@angular/compiler-cli': '22.0.2'
    '@axe-core/playwright': '^4.12.1'
    '@nx/angular': '23.1.0-beta.0'
    '@nx/playwright': '23.1.0-beta.0'
    '@playwright/test': '^1.50.1'
    jsdom: '^29.1.1'
    marked: '^18.0.5'
    ng-packagr: '22.0.0'
  # runtime: cross-cutting helpers
  shared:
    tslib: '^2.8.1'
  # dev: Nx core, TypeScript, lint/format/test tooling
  shared-dev:
    '@nx/js': '23.1.0-beta.0'
    '@nx/eslint': '23.1.0-beta.0'
    eslint: '^10.5.0'
    eslint-config-prettier: '^10.1.8'
    jiti: '^2.7.0'
    lint-suite: '^1.4.0'
    nx: '23.1.0-beta.0'
    nx-stylelint: '^19.0.0'
    prettier: '^3.8.4'
    typescript: '6.0.3'
    typescript-eslint: '^8.61.1'
    vitest: '^4.1.9'
# Reject newly published packages for 24 hours. The temporary migration
# exception is no longer needed now that all pinned releases have aged in.
minimumReleaseAge: 1440
# Explicit lifecycle-script policy: permit only required native/tool builds,
# deny known-unnecessary hooks, and fail installation for any unlisted build.
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  # Less is a pure JavaScript compiler. Explicitly block lifecycle scripts;
  # less@4.5.1 used its hook to invoke a network-capable Playwright install.
  less: false
  lmdb: true
  msgpackr-extract: true
  nx: true
  unrs-resolver: true
auditConfig:
  ignoreCves: []
