<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AngularAdvancedTable</title>
    <base href="/" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta content="light dark" name="color-scheme" />
    <script>
      (function () {
        var storageKey = 'nat-showcase-theme';
        var storedTheme;

        try {
          storedTheme = window.localStorage && window.localStorage.getItem(storageKey);
        } catch (error) {
          storedTheme = null;
        }

        var theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : 'light';

        if (storedTheme !== 'light' && storedTheme !== 'dark') {
          try {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              theme = 'dark';
            }
          } catch (error) {
            theme = 'light';
          }
        }

        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style id="showcase-initial-theme">
      :root[data-theme='dark'] .showcase-shell,
      :root[data-theme='dark'] .showcase-shell .showcase-page {
        --showcase-page-bg: #0b0d10;
        --showcase-page-text: #e6eaef;
        --showcase-page-text-soft: #9aa4b1;
        --showcase-page-text-muted: #7d8794;
        --showcase-page-surface: #14171c;
        --showcase-page-surface-elevated: #14171c;
        --showcase-page-surface-contrast: #1a1e24;
        --showcase-page-surface-muted: #1a1e24;
        --showcase-page-surface-hover: #1f242b;
        --showcase-page-border: #262b33;
        --showcase-page-border-strong: #343b45;
        --showcase-page-accent: #4f8bff;
        --showcase-page-accent-strong: #6a9dff;
        --showcase-page-accent-soft: #16243f;
        --showcase-page-positive: #3dd68c;
        --showcase-page-negative: #f15b5b;
        --showcase-page-warning: #e5b452;
        --showcase-page-focus: rgb(79 139 255 / 36%);
        --showcase-code-bg: #0f1419;
        --showcase-code-border: #30363d;
        --showcase-code-text: #d5dbe3;
        --showcase-code-inline-bg: #1a1e24;
        --showcase-code-token-comment: #8b949e;
        --showcase-code-token-punctuation: #c9d1d9;
        --showcase-code-token-keyword: #ff7b72;
        --showcase-code-token-string: #a5d6ff;
        --showcase-code-token-function: #d2a8ff;
        --showcase-code-token-class: #ffa657;
        --showcase-code-token-number: #79c0ff;
        --showcase-code-token-property: #79c0ff;
        --showcase-code-token-operator: #c9d1d9;
        --showcase-code-token-tag: #7ee787;
        --showcase-page-shadow: 0 1px 2px rgb(0 0 0 / 36%), 0 14px 34px rgb(0 0 0 / 28%);
        --showcase-page-shadow-sm: 0 1px 2px rgb(0 0 0 / 40%);

        color-scheme: dark;
      }
    </style>
    <link href="favicon.svg" rel="icon" type="image/svg+xml" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
