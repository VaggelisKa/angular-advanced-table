<div class="showcase-page showcase-container showcase-wrapper">
  <header class="header-section">
    <div class="header-title-container">
      <h1 class="title">Sticky Header</h1>
      <p class="description">
        This candidate keeps viewport-native sticky header cells, clips the table to the card, and keeps horizontal scrolling contained
        to the table.
      </p>
    </div>
    <label class="toggle-label">
      <input [checked]="stickyHeaderEnabled()" type="checkbox" (change)="toggleStickyHeader($event)" />
      <span>Enable Sticky Header</span>
    </label>
  </header>

  <div class="table-stack">
    @for (i of tableIds; track i) {
    <div class="card sticky-native-contained-card viewport-stack-card">
      <h2 class="card-title">Contained horizontal-scroll table #{{ i }}</h2>
      <div
        #nativeProxyFrame
        class="native-proxy-frame"
        data-native-proxy-frame
        (focusin)="refreshNativeProxyScroll($event)"
        (pointerenter)="refreshNativeProxyScroll($event)"
        (pointercancel)="endNativeProxyDrag($event)"
        (pointerdown)="startNativeProxyDrag($event)"
        (pointermove)="moveNativeProxyDrag($event)"
        (pointerup)="endNativeProxyDrag($event)"
        (wheel)="scrollNativeProxyWheel($event)">
        <nat-table-surface [stickyHeader]="stickyHeaderEnabled()" class="sticky-strategy-native-proxy">
          <nat-table [accessibleName]="`Contained horizontal-scroll sticky table ${i}`" [columns]="columns" [data]="data" />
        </nat-table-surface>
        <div
          aria-label="Scroll native proxy table horizontally"
          class="native-proxy-scrollbar"
          tabindex="0"
          (focus)="refreshNativeProxyScroll($event)"
          (scroll)="syncNativeProxyScroll($event)">
          <div class="native-proxy-scrollbar-track"></div>
        </div>
      </div>
    </div>
    }
  </div>
</div>
