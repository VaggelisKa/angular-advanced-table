<main class="showcase-page simple-sorting-page">
  <nat-table-surface class="simple-table-surface">
    <nat-table
      [data]="rows"
      [columns]="columns"
      [state]="tableState"
      [enableColumnPinning]="true"
      [enableColumnReorder]="false"
      [enableGlobalFilter]="false"
      [enablePagination]="false"
      [getRowId]="getRowId"
      ariaLabel="Simple sortable order table"
    />
  </nat-table-surface>
</main>
