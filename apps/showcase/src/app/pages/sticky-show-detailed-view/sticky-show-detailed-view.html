@if (isDetailsPage()) {
<div class="detailed-page-container">
  <header class="detailed-page-header">
    <button class="back-button" type="button" (click)="goBack()">Back to Examples</button>
  </header>
  <div class="detailed-page-body">
    <ng-container [ngTemplateOutlet]="viewDetailed" />
  </div>
</div>
} @else {
<main class="showcase-page simple-sorting-page">
  <div class="examples-grid">
    @for (item of tables; track $index) {
    <nat-table-surface [(state)]="tableState" class="example-card-surface">
      <h3>{{ item.label }}</h3>
      <p class="description">{{ item.description }}</p>
      <nat-table
        [columns]="columns"
        [data]="rows"
        [getRowId]="getRowId"
        accessibleName="Sortable order table with pinned company and row action columns"
        class="simple-table" />

      <footer>
        <button type="button" (click)="openDetail(item.type)">Detailed view</button>
      </footer>
    </nat-table-surface>
    }
  </div>

  <dialog
    #detailDialog
    aria-label="Detailed order table"
    closedby="any"
    tabindex="-1"
    (click)="onDialogClick($event)"
    (keydown)="onDialogKeyDown($event)">
    <div class="dialog-content">
      <header class="dialog-header">
        <button aria-label="Back to Examples" type="button" (click)="closeDialog()">Back to Examples</button>
      </header>
      <div class="dialog-body">
        <ng-container [ngTemplateOutlet]="viewDetailed" />
      </div>
    </div>
  </dialog>
</main>
}

<ng-template #viewDetailed>
  <nat-table-surface [stickyHeader]="true" [(state)]="detailedTableState" class="dialog-table-surface">
    <nat-table
      [columns]="columns"
      [data]="detailedRows"
      [getRowId]="getRowId"
      accessibleName="Detailed order table"
      class="simple-table" />
  </nat-table-surface>
</ng-template>
