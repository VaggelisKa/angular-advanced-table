<main class="showcase-page sc-demo-page">
  <nat-table-surface [enableSorting]="true" [state]="tableState" [stickyHeader]="true">
    <nat-table
      [columns]="columns"
      [data]="rows"
      [getRowId]="getRowId"
      accessibleName="Sortable order table with pinned company and row action columns"
      class="sc-demo-table" />
  </nat-table-surface>
</main>
