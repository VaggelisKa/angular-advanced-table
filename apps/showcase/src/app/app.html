<div class="showcase-shell" [class.is-nav-open]="mobileNavOpen()" [attr.data-theme]="theme()">
  <header class="showcase-mobile-header" [attr.inert]="mobileNavOpen() ? '' : null">
    <span class="showcase-mobile-brand">
      <span class="showcase-mark" aria-hidden="true">AT</span>
      <span class="showcase-brand-copy">
        <span class="showcase-eyebrow">Showcase</span>
        <span class="showcase-mobile-title">Table examples</span>
      </span>
    </span>

    <button
      #mobileMenuButton
      type="button"
      class="showcase-menu-button"
      aria-controls="showcase-navigation"
      [attr.aria-expanded]="mobileNavOpen()"
      aria-label="Open examples navigation"
      title="Open examples navigation"
      (click)="toggleMobileNav()"
    >
      <svg class="showcase-menu-icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
        <path d="M3 5.5h14M3 10h14M3 14.5h14" />
      </svg>
    </button>
  </header>

  @if (mobileNavOpen()) {
    <div class="showcase-nav-backdrop" aria-hidden="true" (click)="closeMobileNav()"></div>
  }

  <aside
    #mobileNavPanel
    id="showcase-navigation"
    class="showcase-nav"
    [class.is-open]="mobileNavOpen()"
    [attr.role]="mobileNavOpen() ? 'dialog' : null"
    [attr.aria-modal]="mobileNavOpen() ? 'true' : null"
    aria-labelledby="showcase-nav-title"
    (keydown)="trapMobileNavFocus($event)"
    (keydown.escape)="closeMobileNav()"
  >
    <div class="showcase-nav-header">
      <span class="showcase-mark" aria-hidden="true">AT</span>
      <span class="showcase-brand-copy">
        <span class="showcase-eyebrow">Showcase</span>
        <h1 id="showcase-nav-title">Table examples</h1>
      </span>
      <button
        #mobileNavCloseButton
        type="button"
        class="showcase-nav-close"
        aria-label="Close examples navigation"
        title="Close examples navigation"
        (click)="closeMobileNav()"
      >
        <svg class="showcase-menu-icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M5 5l10 10M15 5 5 15" />
        </svg>
      </button>
    </div>

    <span class="showcase-nav-caption">Example variants</span>

    <nav class="showcase-nav-list" aria-label="Example variants">
      @for (example of examples; track example.path) {
        <a
          class="showcase-nav-link"
          [routerLink]="example.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="exactLinkMatch"
          ariaCurrentWhenActive="page"
          (click)="closeMobileNav(false)"
        >
          <span class="showcase-nav-link-label">{{ example.label }}</span>
          <span class="showcase-nav-link-description">{{ example.description }}</span>
        </a>
      }
    </nav>

    <div class="showcase-theme-control">
      <span class="showcase-nav-caption">Theme</span>
      <div class="showcase-theme-toggle" role="group" aria-label="Color theme">
        <button
          type="button"
          class="showcase-theme-option"
          [class.is-active]="theme() === 'light'"
          [attr.aria-pressed]="theme() === 'light'"
          (click)="setTheme('light')"
        >
          <svg class="showcase-theme-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <circle cx="8" cy="8" r="3" />
            <path
              d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
          Light
        </button>
        <button
          type="button"
          class="showcase-theme-option"
          [class.is-active]="theme() === 'dark'"
          [attr.aria-pressed]="theme() === 'dark'"
          (click)="setTheme('dark')"
        >
          <svg class="showcase-theme-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path d="M13 9.5A5.5 5.5 0 1 1 6.5 3a4.5 4.5 0 0 0 6.5 6.5z" fill="currentColor" />
          </svg>
          Dark
        </button>
      </div>
    </div>
  </aside>

  <main class="showcase-content" [attr.inert]="mobileNavOpen() ? '' : null">
    <router-outlet />
  </main>
</div>
