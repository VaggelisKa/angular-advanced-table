<div class="showcase-shell" [attr.data-theme]="theme()">
  <aside class="showcase-nav" aria-labelledby="showcase-nav-title">
    <div class="showcase-nav-header">
      <span class="showcase-mark" aria-hidden="true">AT</span>
      <span class="showcase-brand-copy">
        <span class="showcase-eyebrow">Showcase</span>
        <h1 id="showcase-nav-title">Table examples</h1>
      </span>
    </div>

    <span class="showcase-nav-caption">Example variants</span>

    <nav class="showcase-nav-list" aria-label="Example variants">
      @for (example of examples; track example.path) {
        <a
          class="showcase-nav-link"
          [routerLink]="example.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="exactLinkMatch"
          ariaCurrentWhenActive="page"
        >
          <span class="showcase-nav-link-label">{{ example.label }}</span>
          <span class="showcase-nav-link-description">{{ example.description }}</span>
        </a>
      }
    </nav>

    <div class="showcase-theme-control">
      <span class="showcase-nav-caption">Theme</span>
      <div class="showcase-theme-toggle" role="group" aria-label="Color theme">
        <button
          type="button"
          class="showcase-theme-option"
          [class.is-active]="theme() === 'light'"
          [attr.aria-pressed]="theme() === 'light'"
          (click)="setTheme('light')"
        >
          <svg class="showcase-theme-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <circle cx="8" cy="8" r="3" />
            <path
              d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
          Light
        </button>
        <button
          type="button"
          class="showcase-theme-option"
          [class.is-active]="theme() === 'dark'"
          [attr.aria-pressed]="theme() === 'dark'"
          (click)="setTheme('dark')"
        >
          <svg class="showcase-theme-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path d="M13 9.5A5.5 5.5 0 1 1 6.5 3a4.5 4.5 0 0 0 6.5 6.5z" fill="currentColor" />
          </svg>
          Dark
        </button>
      </div>
    </div>
  </aside>

  <main class="showcase-content">
    <router-outlet />
  </main>
</div>
