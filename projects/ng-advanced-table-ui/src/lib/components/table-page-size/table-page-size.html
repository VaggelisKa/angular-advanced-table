@if (for().enablePagination()) {
  <div class="chip-row compact" role="group" [attr.aria-label]="resolvedAriaLabel()">
    @for (option of resolvedPageSizeOptions(); track option.pageSize) {
      <button
        type="button"
        class="chip"
        [class.is-active]="selectedPageSize() === option.pageSize"
        [attr.aria-controls]="tableElementId()"
        [attr.aria-label]="option.ariaLabel"
        [attr.aria-pressed]="selectedPageSize() === option.pageSize"
        (click)="setPageSize(option.pageSize)"
      >
        {{ option.text }}
      </button>
    }
  </div>
}
