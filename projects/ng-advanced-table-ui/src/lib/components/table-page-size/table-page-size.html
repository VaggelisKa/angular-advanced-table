@if (for().enablePagination()) {
  <div class="chip-row compact" role="group" [attr.aria-label]="ariaLabel()">
    @for (size of sanitizedPageSizeOptions(); track size) {
      <button
        type="button"
        class="chip"
        [class.is-active]="selectedPageSize() === size"
        [attr.aria-controls]="tableElementId()"
        [attr.aria-label]="'Show ' + size + ' rows per page'"
        [attr.aria-pressed]="selectedPageSize() === size"
        (click)="setPageSize(size)"
      >
        {{ size }} / page
      </button>
    }
  </div>
}
