<div class="header-content" [class.is-align-end]="isAlignedEnd()">
  @if (canSort()) {
    <button
      type="button"
      class="sort-button"
      [class.is-sorted]="!!column().getIsSorted()"
      [attr.aria-label]="getSortLabel()"
      (click)="toggleSort()"
    >
      <span class="header-label">
        <ng-container *flexRender="content(); props: context(); let rendered">
          {{ rendered }}
        </ng-container>
      </span>
      <span class="sort-icon" aria-hidden="true">
        @if (hasCustomSortIndicator()) {
          <ng-container
            *flexRender="sortIndicator(); props: sortIndicatorContext(); let rendered"
          >
            {{ rendered }}
          </ng-container>
        } @else {
          {{ sortIcon() }}
        }
      </span>
    </button>
  } @else {
    <span class="header-label">
      <ng-container *flexRender="content(); props: context(); let rendered">
        {{ rendered }}
      </ng-container>
    </span>
  }

  @if (canPin()) {
    <button
      type="button"
      class="pin-button"
      [class.is-pinned]="isPinned()"
      [attr.aria-pressed]="isPinned()"
      [attr.aria-label]="getPinLabel()"
      (click)="togglePin()"
    >
      {{ isPinned() ? 'Unpin' : 'Pin' }}
    </button>
  }
</div>
