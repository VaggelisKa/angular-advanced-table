<div class="header-content" [class.is-align-end]="isAlignedEnd()">
  @if (canSort()) {
    <button
      type="button"
      ngGridCellWidget
      class="sort-button"
      [class.is-sorted]="!!column().getIsSorted()"
      [attr.aria-label]="getSortLabel()"
      (pointerdown)="$event.stopPropagation()"
      (click)="toggleSort()"
    >
      <span class="header-label">
        <ng-container *flexRender="content(); props: context(); let rendered">
          {{ rendered }}
        </ng-container>
      </span>
      <span class="sort-icon" aria-hidden="true">
        @if (hasCustomSortIndicator()) {
          <ng-container *flexRender="sortIndicator(); props: sortIndicatorContext(); let rendered">
            {{ rendered }}
          </ng-container>
        } @else {
          <span
            class="nat-default-sort"
            [attr.data-sort-state]="sortState() === false ? 'none' : sortState()"
          >
            <svg
              class="nat-default-sort__svg"
              viewBox="0 0 12 14"
              focusable="false"
              aria-hidden="true"
            >
              <path class="nat-default-sort__up" d="M6 2 10 6 H2z" />
              <path class="nat-default-sort__down" d="M6 12 2 8 H10z" />
            </svg>
          </span>
        }
      </span>
    </button>
  } @else {
    <span class="header-label">
      <ng-container *flexRender="content(); props: context(); let rendered">
        {{ rendered }}
      </ng-container>
    </span>
  }

  @if (canPin()) {
    <div class="pin-button-group">
      @for (side of pinSides; track side) {
        <button
          type="button"
          ngGridCellWidget
          class="pin-button"
          [class.is-icon-only]="!hasCustomPinText()"
          [class.is-textual]="hasCustomPinText()"
          [class.is-pinned]="isPinned(side)"
          [attr.aria-pressed]="isPinned(side)"
          [attr.aria-label]="getPinLabel(side)"
          [attr.data-pin-side]="side"
          (pointerdown)="$event.stopPropagation()"
          (click)="togglePin(side)"
        >
          @if (hasCustomPinText()) {
            {{ getPinText(side) }}
          } @else {
            <span class="pin-button-icon" [attr.data-pin-side]="side" aria-hidden="true">
              @if (side === 'left') {
                <svg viewBox="0 0 18 18" focusable="false" aria-hidden="true">
                  <path class="pin-button-icon__rail" d="M3.25 4.25v9.5" />
                  <rect
                    class="pin-button-icon__panel"
                    x="6.25"
                    y="5.25"
                    width="8.5"
                    height="7.5"
                    rx="2"
                  />
                </svg>
              } @else {
                <svg viewBox="0 0 18 18" focusable="false" aria-hidden="true">
                  <path class="pin-button-icon__rail" d="M14.75 4.25v9.5" />
                  <rect
                    class="pin-button-icon__panel"
                    x="3.25"
                    y="5.25"
                    width="8.5"
                    height="7.5"
                    rx="2"
                  />
                </svg>
              }
            </span>
          }
        </button>
      }
    </div>
  }
</div>
