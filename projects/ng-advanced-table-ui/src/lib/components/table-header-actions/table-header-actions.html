<div class="header-content" [class.is-align-end]="isAlignedEnd()">
  @if (canSort()) {
    <button
      type="button"
      class="sort-button"
      [class.is-sorted]="!!column().getIsSorted()"
      [attr.aria-label]="getSortLabel()"
      (click)="toggleSort()"
    >
      <span class="header-label">
        <ng-container *flexRender="content(); props: context(); let rendered">
          {{ rendered }}
        </ng-container>
      </span>
      <span class="sort-icon" aria-hidden="true">
        @if (hasCustomSortIndicator()) {
          <ng-container
            *flexRender="sortIndicator(); props: sortIndicatorContext(); let rendered"
          >
            {{ rendered }}
          </ng-container>
        } @else {
          <span
            class="nat-default-sort"
            [attr.data-sort-state]="sortState() === false ? 'none' : sortState()"
          >
            <span class="nat-default-sort-rail" aria-hidden="true">
              <svg class="nat-default-sort-arrow" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M8 2.5 12.5 7H9.5v6.5h-3V7h-3L8 2.5Z" fill="currentColor" />
              </svg>
            </span>
          </span>
        }
      </span>
    </button>
  } @else {
    <span class="header-label">
      <ng-container *flexRender="content(); props: context(); let rendered">
        {{ rendered }}
      </ng-container>
    </span>
  }

  @if (canPin()) {
    <button
      type="button"
      class="pin-button"
      [class.is-pinned]="isPinned()"
      [attr.aria-pressed]="isPinned()"
      [attr.aria-label]="getPinLabel()"
      (click)="togglePin()"
    >
      {{ isPinned() ? 'Unpin' : 'Pin' }}
    </button>
  }
</div>
