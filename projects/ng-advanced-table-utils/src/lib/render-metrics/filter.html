<div class="control-block">
  <div class="control-heading">
    <span class="control-label">Render speed</span>
    <span class="control-caption">{{ caption() }}</span>
  </div>
  <div class="chip-row" role="group" aria-label="Row render speed">
    @for (option of options; track option.value) {
      <button
        type="button"
        class="chip render-chip"
        [class.is-active]="selected() === option.value"
        [attr.aria-pressed]="selected() === option.value"
        [attr.data-render-filter]="option.value"
        (click)="setFilter(option.value)"
      >
        <span>{{ option.label }}</span>
        <span class="chip-count">{{ option.description }}</span>
      </button>
    }
  </div>
</div>
